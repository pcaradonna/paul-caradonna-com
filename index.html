<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paul CaraDonna</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      background: #000;
      color: #fff;
      font-family: Menlo, Monaco, Consolas, 'Courier New', monospace;
      font-size: clamp(0.95rem, 1.6vw, 1.1rem);
      font-weight: 400;
    }

    header {
      padding: 4vw 6vw 3vw;
    }

    .title {
      font-size: 1.35em;
      font-weight: inherit;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    #hero {
      display: block;
      width: calc(100% - 12vw);
      margin: 0 6vw 6vw;
      height: 75vh;
      object-fit: cover;
      object-position: center;
    }

    footer {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <header>
    <h1 class="title">The Research Group of Paul CaraDonna</h1>
  </header>
  <img id="hero" src="" alt="Field site landscape">
  <footer>paul-caradonna.com</footer>
  <script>
    const images = [
      'assets/000001980005.jpg',
      'assets/000001980011.jpg',
      'assets/000001980019.jpg',
      'assets/000001980020.jpg',
      'assets/000001980021.jpg',
      'assets/000001980025.jpg'
    ];
    document.getElementById('hero').src = images[Math.floor(Math.random() * images.length)];
  </script>
</body>
</html>
