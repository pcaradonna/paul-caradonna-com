    short: "CaraDonna & Inouye",
    year: 2015,
    journal: "Ecology",
    citation: "CaraDonna, P.J., D.W. Inouye. Phenological responses to climate change do not exhibit phylogenetic signal in a subalpine plant community. Ecology. 96: 355–361.",

    tags: ["phenology", "subalpine", "community", "climate"]
  },
  {

    title: "Phenological shifts and the fate of mutualism",
    short: "Rafferty, CaraDonna, Bronstein",
    year: 2015,
    journal: "Oikos",
    citation: "Rafferty, N.E., P.J. CaraDonna, J.L. Bronstein. Phenological shifts and the fate of mutualism. Oikos. 124: 14–21.",

    tags: ["phenology", "networks", "climate"]
  },
  // 2014
  {
    id: 39,
    title: "Shifts in flowering phenology reshape a subalpine plant community",
    short: "CaraDonna, Iler, Inouye",
    year: 2014,
    journal: "PNAS",
    citation: "CaraDonna, P.J., A.M. Iler, D.W. Inouye. Shifts in flowering phenology reshape a subalpine plant community. PNAS. 111: 4916–4921.",
    doi: "https://doi.org/10.1073/pnas.1323073111",
    tags: ["phenology", "subalpine", "community", "climate"]
  },
  // 2013
  {
    id: 40,
    title: "Phenological overlap of interacting species in a changing climate: an assessment of available approaches",
    short: "Rafferty, CaraDonna, Burkle, Iler, Bronstein",
    year: 2013,
    journal: "Ecology & Evolution",
    citation: "Rafferty, N.E., P.J. CaraDonna, L.A. Burkle, A.M. Iler, J.L. Bronstein. Phenological overlap of interacting species in a changing climate: an assessment of available approaches. Ecology & Evolution. 3: 3183-3193.",
    doi: "https://doi.org/10.1002/ece3.722",
    tags: ["phenology", "climate", "networks"]
  },
  // 2012
  {
    id: 41,
    title: "Asynchronous changes in phenology of migrating Broad-tailed Hummingbirds and their early-season nectar resources",
    short: "McKinney, CaraDonna, Inouye, Barr, Bertelsen, Waser",
    year: 2012,
    journal: "Ecology",
    citation: "McKinney, A.M., P.J. CaraDonna, D.W. Inouye, W.A. Barr, C.D. Bertelsen, N.M. Waser. Asynchronous changes in phenology of migrating Broad-tailed Hummingbirds and their early-season nectar resources. Ecology. 93: 1987-1993.",
    doi: "https://doi.org/10.1890/12-0255.1",

  },
  {
    id: 42,
    title: "Reproductive assurance for a rewardless epiphytic orchid in Puerto Rico, Pleurothallis ruscifolia",
    short: "CaraDonna & Ackerman",
    year: 2012,
    journal: "Caribbean Journal of Science",
    citation: "CaraDonna, P.J., J.D. Ackerman. Reproductive assurance for a rewardless epiphytic orchid in Puerto Rico, Pleurothallis ruscifolia. The Caribbean Journal of Science. 46 (2-3): 249-257.",
    doi: "",
    tags: ["community"]
  }
];

// ── LINKS: auto-generate from ≥2 shared tags ─────────────────────────────────
const links = [];
for (let i = 0; i < papers.length; i++) {
  for (let j = i + 1; j < papers.length; j++) {
    const shared = papers[i].tags.filter(t => papers[j].tags.includes(t));
    if (shared.length >= 2) {
      links.push({ source: papers[i].id, target: papers[j].id });
    }
  }
}

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
const CARD_W = 220;
const CARD_H = 85;
const CARD_R = Math.sqrt((CARD_W / 2) ** 2 + (CARD_H / 2) ** 2) + 10;

let W = window.innerWidth;
let H = window.innerHeight;

// ── PAN STATE ────────────────────────────────────────────────────────────────
let panX = 0, panY = 0;

function applyPan() {
  cardsContainer.style.transform = `translate(${panX}px,${panY}px)`;
  svgGroup.attr('transform', `translate(${panX},${panY})`);
}

// ── SVG LINES ────────────────────────────────────────────────────────────────
const svg = d3.select('#lines')
  .attr('width', W)
  .attr('height', H);

const svgGroup = svg.append('g');

const lineEls = svgGroup.selectAll('line')
  .data(links)
  .enter()
  .append('line')
  .attr('stroke', 'rgba(255,255,255,0.28)')
  .attr('stroke-width', 1);

// ── CARDS ─────────────────────────────────────────────────────────────────────
const nodes = papers.map(p => ({
  ...p,
  x: W / 2 + (Math.random() - 0.5) * W * 0.55,
  y: H / 2 + (Math.random() - 0.5) * H * 0.55
}));

const cardsContainer = document.getElementById('cards');

const cardEls = nodes.map((node, i) => {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML =
    '<div class="card-title">' + node.title + '</div>' +
    '<div class="card-meta">' + node.short + ' \u00b7 ' + node.year +
    (node.journal ? ' \u00b7 ' + node.journal : '') + '</div>';
  div.style.left = node.x + 'px';
  div.style.top = node.y + 'px';
  cardsContainer.appendChild(div);
  return div;
});

// ── SIMULATION ───────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(260).strength(0.15))
  .force('charge', d3.forceManyBody().strength(-250))
  .force('center', d3.forceCenter(W / 2, H / 2).strength(0.02))
  .force('collide', d3.forceCollide(CARD_R).strength(0.7))
  .alphaDecay(0.04)
  .velocityDecay(0.85)
  .on('tick', tick);

function tick() {
  nodes.forEach((node, i) => {
    cardEls[i].style.left = node.x + 'px';
    cardEls[i].style.top = node.y + 'px';
  });

  lineEls
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
}

// ── DRAG ─────────────────────────────────────────────────────────────────────
cardEls.forEach((el, i) => {
  const node = nodes[i];
  let didDrag = false;
  let startMouseX, startMouseY, startNodeX, startNodeY;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    didDrag = false;
    startMouseX = e.clientX;
    startMouseY = e.clientY;
    startNodeX = node.x;
    startNodeY = node.y;
    node.fx = node.x;
    node.fy = node.y;
    simulation.alphaTarget(0.08).restart();

    const onMove = e => {
      const dx = e.clientX - startMouseX;
      const dy = e.clientY - startMouseY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
      node.fx = startNodeX + dx;
      node.fy = startNodeY + dy;
    };

    const onUp = () => {
      node.fx = null;
      node.fy = null;
      simulation.alphaTarget(0);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  el.addEventListener('click', e => {
    if (didDrag) return;
    e.stopPropagation();
    openDetail(node, el);
  });
});

// ── BACKGROUND PAN ───────────────────────────────────────────────────────────
cardsContainer.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const startPanX = panX, startPanY = panY;
  const startMouseX = e.clientX, startMouseY = e.clientY;
  cardsContainer.classList.add('panning');

  const onMove = e => {
    panX = startPanX + (e.clientX - startMouseX);
    panY = startPanY + (e.clientY - startMouseY);
    applyPan();
  };

  const onUp = () => {
    cardsContainer.classList.remove('panning');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ── DETAIL PANEL ─────────────────────────────────────────────────────────────
const panel = document.getElementById('detail-panel');
const detailTitle = document.getElementById('detail-title');
const detailCitation = document.getElementById('detail-citation');
const detailDoi = document.getElementById('detail-doi');
const detailClose = document.getElementById('detail-close');
let activeCard = null;

function openDetail(node, el) {
  if (activeCard) activeCard.classList.remove('active');
  activeCard = el;
  el.classList.add('active');

  detailTitle.textContent = node.title;
  detailCitation.textContent = node.citation;

  if (node.doi) {
    detailDoi.href = node.doi;
    detailDoi.textContent = node.doi;
    detailDoi.style.display = '';
  } else {
    detailDoi.style.display = 'none';
  }

  panel.classList.add('open');
}

function closeDetail() {
  panel.classList.remove('open');
  if (activeCard) {
    activeCard.classList.remove('active');
    activeCard = null;
  }
}

document.addEventListener('click', closeDetail);
detailClose.addEventListener('click', e => { e.stopPropagation(); closeDetail(); });

// ── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  svg.attr('width', W).attr('height', H);
  simulation.force('center', d3.forceCenter(W / 2, H / 2).strength(0.02));
  simulation.alpha(0.3).restart();
});
</script>
