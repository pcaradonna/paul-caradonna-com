// ── THEME COLORS ─────────────────────────────────────────────────────────────
const themeColors = {
  plant:                  '#5a9e50',
  animal:                 '#e8853a',
  pollinator:             '#d4c020',
  community:              '#8a8a8a',
  interactions:           '#38bfc0',

// ── LINKS: auto-generate from ≥2 shared RESEARCH tags (organism tags excluded) ─
const ORGANISM_TAGS = new Set(['plant', 'animal', 'pollinator']);

const tagFreq = {};
papers.forEach(p => p.tags.forEach(t => {
  if (!ORGANISM_TAGS.has(t)) tagFreq[t] = (tagFreq[t] || 0) + 1;
}));

const links = [];
for (let i = 0; i < papers.length; i++) {
  for (let j = i + 1; j < papers.length; j++) {
    const shared = papers[i].tags.filter(t => !ORGANISM_TAGS.has(t) && papers[j].tags.includes(t));
    if (shared.length >= 2) {
      // color by the rarest shared theme (most specific)
      const theme = shared.slice().sort((a, b) => (tagFreq[a] || 0) - (tagFreq[b] || 0))[0];
      links.push({ source: papers[i].id, target: papers[j].id, theme });
    }
  }
}

// ── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
const CARD_W = 220;
const CARD_H = 85;
const CARD_R = Math.sqrt((CARD_W / 2) ** 2 + (CARD_H / 2) ** 2) + 10;

let W = window.innerWidth;
let H = window.innerHeight;

// ── PAN + ZOOM STATE ─────────────────────────────────────────────────────────
let panX = 0, panY = 0, zoomScale = 1.0;

// ── SVG LINES ────────────────────────────────────────────────────────────────
const svg = d3.select('#lines')
  .attr('width', W)
  .attr('height', H);

const svgGroup = svg.append('g');

const lineEls = svgGroup.selectAll('line')
  .data(links)
  .enter()
  .append('line')
  .attr('stroke', d => themeColors[d.theme] || '#fff')
  .attr('stroke-opacity', 0.55)
  .attr('stroke-width', 1);

// ── CARDS ─────────────────────────────────────────────────────────────────────
const nodes = papers.map(p => ({
  ...p,
  x: W / 2 + (Math.random() - 0.5) * W * 0.7,
  y: H * 0.55 + (Math.random() - 0.5) * H * 0.5
}));

const cardsContainer = document.getElementById('cards');

const cardEls = nodes.map((node, i) => {
  const div = document.createElement('div');
  div.className = 'card';
  const dots = node.tags.map(t =>
    '<span class="tag-dot" style="background:' + (themeColors[t] || '#888') + '" title="' + t + '"></span>'
  ).join('');
  div.innerHTML =
    '<div class="card-title">' + node.title + '</div>' +
    '<div class="card-meta">' + node.short + ' \u00b7 ' + node.year + '</div>' +
    '<div class="card-dots">' + dots + '</div>';
  div.style.left = node.x + 'px';
  div.style.top = node.y + 'px';
  cardsContainer.appendChild(div);
  return div;
});

// ── SIMULATION ───────────────────────────────────────────────────────────────
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d => d.id).distance(320).strength(0.12))
  .force('charge', d3.forceManyBody().strength(-380))
  .force('center', d3.forceCenter(W / 2, H * 0.58).strength(0.02))
  .force('yBias', d3.forceY(H * 0.6).strength(0.015))
  .force('collide', d3.forceCollide(CARD_R).strength(0.7))
  .alphaDecay(0.04)
  .velocityDecay(0.85)
  .on('tick', tick);

function updatePositions() {
  nodes.forEach((node, i) => {
    cardEls[i].style.left = (node.x * zoomScale + panX) + 'px';
    cardEls[i].style.top  = (node.y * zoomScale + panY) + 'px';
    cardEls[i].style.transform = 'translate(-50%,-50%) scale(' + zoomScale + ')';
  });
  svgGroup.attr('transform', `translate(${panX},${panY}) scale(${zoomScale})`);
  lineEls
    .attr('x1', d => d.source.x)
    .attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x)
    .attr('y2', d => d.target.y);
}

function tick() {
  updatePositions();
}

function zoomAround(cx, cy, factor) {
  const newScale = Math.max(0.55, Math.min(3, zoomScale * factor));
  const simCX = (cx - panX) / zoomScale;
  const simCY = (cy - panY) / zoomScale;
  panX = cx - simCX * newScale;
  panY = cy - simCY * newScale;
  zoomScale = newScale;
  updatePositions();
}

// ── DRAG ─────────────────────────────────────────────────────────────────────
cardEls.forEach((el, i) => {
  const node = nodes[i];
  let didDrag = false;
  let startMouseX, startMouseY, startNodeX, startNodeY;

  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.stopPropagation();
    didDrag = false;
    startMouseX = e.clientX;
    startMouseY = e.clientY;
    startNodeX = node.x;
    startNodeY = node.y;
    node.fx = node.x;
    node.fy = node.y;
    simulation.alphaTarget(0.08).restart();

    const onMove = e => {
      const dx = e.clientX - startMouseX;
      const dy = e.clientY - startMouseY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didDrag = true;
      node.fx = startNodeX + dx / zoomScale;
      node.fy = startNodeY + dy / zoomScale;
    };

    const onUp = () => {
      node.fx = null;
      node.fy = null;
      simulation.alphaTarget(0);
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  el.addEventListener('click', e => {
    if (didDrag) return;
    e.stopPropagation();
    openDetail(node, el);
  });
});

// ── BACKGROUND PAN ───────────────────────────────────────────────────────────
let didPan = false;
cardsContainer.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const startPanX = panX, startPanY = panY;
  const startMouseX = e.clientX, startMouseY = e.clientY;
  didPan = false;
  cardsContainer.classList.add('panning');

  const onMove = e => {
    const dx = e.clientX - startMouseX;
    const dy = e.clientY - startMouseY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) didPan = true;
    panX = startPanX + dx;
    panY = startPanY + dy;
    updatePositions();
  };

  const onUp = () => {
    cardsContainer.classList.remove('panning');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ── ZOOM BUTTONS ─────────────────────────────────────────────────────────────
document.getElementById('zoom-in').addEventListener('click', e => {
  e.stopPropagation();
  zoomAround(W / 2, H / 2, 1.1);
});
document.getElementById('zoom-out').addEventListener('click', e => {
  e.stopPropagation();
  zoomAround(W / 2, H / 2, 1 / 1.1);
});

// scroll-wheel zoom (disabled in list view so normal scroll works)
document.addEventListener('wheel', e => {
  if (isListView) return;
  e.preventDefault();
  zoomAround(e.clientX, e.clientY, e.deltaY < 0 ? 1.04 : 1 / 1.04);
}, { passive: false });

// ── DETAIL PANEL ─────────────────────────────────────────────────────────────
const panel = document.getElementById('detail-panel');
const detailTitle = document.getElementById('detail-title');
const detailCitation = document.getElementById('detail-citation');
const detailTags = document.getElementById('detail-tags');
const detailDoi = document.getElementById('detail-doi');
const detailClose = document.getElementById('detail-close');
let activeCard = null;

function openDetail(node, el) {
  if (activeCard) activeCard.classList.remove('active');
  activeCard = el;
  el.classList.add('active');

  detailTitle.textContent = node.title;
  detailCitation.textContent = node.citation;

  detailTags.innerHTML = node.tags.map(t => {
    const col = themeColors[t] || '#555';
    return '<span class="detail-tag" style="background:' + col + '22; color:' + col + '; border:1px solid ' + col + '55">' + t + '</span>';
  }).join('');

  if (node.doi) {
    detailDoi.href = node.doi;
    detailDoi.textContent = node.doi;
    detailDoi.style.display = '';
  } else {
    detailDoi.style.display = 'none';
  }

  panel.classList.add('open');
}

function closeDetail() {
  panel.classList.remove('open');
  if (activeCard) {
    activeCard.classList.remove('active');
    activeCard = null;
  }
}

document.addEventListener('click', () => { if (!didPan) closeDetail(); didPan = false; });
detailClose.addEventListener('click', e => { e.stopPropagation(); closeDetail(); });

// ── LEGEND & THEME FILTER ────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
let activeTheme = null;

themeOrder.forEach(theme => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.theme = theme;
  item.innerHTML =
    '<span class="legend-dot" style="background:' + themeColors[theme] + '"></span>' +
    '<span class="legend-label">' + theme + '</span>';
  item.addEventListener('click', e => {
    e.stopPropagation();
    if (activeTheme === theme) {
      activeTheme = null;
      applyThemeFilter();
      item.classList.remove('active');
    } else {
      legendEl.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
      activeTheme = theme;
      applyThemeFilter();
      item.classList.add('active');
    }
  });
  legendEl.appendChild(item);
});

function applyThemeFilter() {
  if (!activeTheme) {
    cardEls.forEach(el => el.classList.remove('dimmed'));
    lineEls.classed('dimmed', false);
    return;
  }
  cardEls.forEach((el, i) => {
    el.classList.toggle('dimmed', !nodes[i].tags.includes(activeTheme));
  });
  lineEls.classed('dimmed', d => d.theme !== activeTheme);
}

// clear filter on background click (not after a pan)
document.addEventListener('click', () => {
  if (didPan) return;
  if (activeTheme) {
    activeTheme = null;
    applyThemeFilter();
    legendEl.querySelectorAll('.legend-item').forEach(el => el.classList.remove('active'));
  }
});

// ── LIST VIEW ────────────────────────────────────────────────────────────────
(function buildListView() {
  const byYear = {};
  papers.forEach(p => {
    const y = String(p.year);
    if (!byYear[y]) byYear[y] = [];
    byYear[y].push(p);
  });
  const years = Object.keys(byYear).sort((a, b) => {
    if (a === 'in rev.') return -1;
    if (b === 'in rev.') return 1;
    return Number(b) - Number(a);
  });
  let html = '';
  years.forEach(y => {
    const label = (y === 'in rev.') ? 'In Revision' : y;
    html += '<div class="list-year-group"><div class="list-year">' + label + '</div>';
    byYear[y].forEach(p => {
      html += '<div class="list-paper">' +
        '<div class="list-title">' + p.title + '</div>' +
        '<div class="list-citation">' + p.citation + '</div>' +
        (p.doi ? '<a class="list-doi" href="' + p.doi + '" target="_blank" rel="noopener">' + p.doi + '</a>' : '') +
        '</div>';
    });
    html += '</div>';
  });
  document.getElementById('list-view').innerHTML = html;
})();

let isListView = false;
const viewToggleBtn = document.getElementById('view-toggle');
const zoomControls = document.getElementById('zoom-controls');

viewToggleBtn.addEventListener('click', e => {
  e.stopPropagation();
  isListView = !isListView;
  if (isListView) {
    document.getElementById('lines').style.display = 'none';
    document.getElementById('cards').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    zoomControls.style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    viewToggleBtn.textContent = '\u29C6 network';
  } else {
    document.getElementById('lines').style.display = '';
    document.getElementById('cards').style.display = '';
    document.getElementById('legend').style.display = '';
    zoomControls.style.display = '';
    document.getElementById('list-view').style.display = 'none';
    viewToggleBtn.textContent = '\u2630 list';
  }
});

// ── RESIZE ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W = window.innerWidth;
  H = window.innerHeight;
  svg.attr('width', W).attr('height', H);
  simulation.force('center', d3.forceCenter(W / 2, H * 0.58).strength(0.02));
  simulation.alpha(0.3).restart();
});
</script>
